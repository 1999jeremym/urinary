<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;padding:0;transition:background .3s}
.gd{background:rgba(15,23,42,.8);backdrop-filter:blur(20px);border:1px solid rgba(51,65,85,.5)}
.gl{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border:1px solid rgba(203,213,225,.8)}
.tr{transition:all .2s ease}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(100,116,139,.4);border-radius:9px}
.hs{cursor:pointer;transition:all .2s}.hs:hover{filter:brightness(1.25) drop-shadow(0 0 6px rgba(13,148,136,.5))}
.hs.on{filter:drop-shadow(0 0 10px rgba(139,92,246,.7))}
.badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:11px;font-weight:600}
@keyframes primerIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes flowDash{to{stroke-dashoffset:-24}}
@keyframes pulseGlom{0%,100%{r:17}50%{r:19}}
@keyframes floatDot{0%{offset-distance:0%}100%{offset-distance:100%}}
.flow-line{stroke-dasharray:6,6;animation:flowDash 1s linear infinite}
.pulse-glom{animation:pulseGlom 1.5s ease-in-out infinite}
@keyframes aBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes aSqueeze{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.7)}}
@keyframes aFill{0%{height:0}80%{height:40px}100%{height:40px}}
@keyframes aDoor{0%,40%{transform:translateY(0)}50%,90%{transform:translateY(6px)}100%{transform:translateY(0)}}
@keyframes aGrab{0%{transform:translateX(16px);opacity:1}100%{transform:translateX(0);opacity:0}}
@keyframes aDrip{0%{transform:translateY(0);opacity:1}100%{transform:translateY(18px);opacity:0}}
@keyframes aPump{0%{transform:translateX(0);opacity:1}100%{transform:translateX(18px);opacity:0}}
@keyframes aSpin{to{transform:rotate(360deg)}}
@keyframes aSeesaw{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
@keyframes aStrip{0%{width:0}100%{width:100%}}
.primer-card{animation:primerIn .4s ease-out}
.primer-step{border-left:2px solid rgba(13,148,136,.4);padding-left:12px;margin-bottom:10px}
.primer-step:last-child{margin-bottom:0}
@media(max-width:767px){
  .desktop-tabs{display:none!important}
  .mobile-bnav{display:flex!important}
  .main-wrap{padding-bottom:68px}
}
@media(min-width:768px){
  .mobile-bnav{display:none!important}
}

const {useState,useEffect,useRef}=React;
const Ic={
  Map:()=><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>,

  Flow:()=><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>,
  Lab:()=><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>,
  Draw:()=><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>,

  Moon:()=><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>,

  File:()=><svg className="w-3.5 h-3.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>,
  Trash:()=><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
  Caret:({o})=><svg className={`w-3 h-3 tr ${o?'rotate-90':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"/></svg>,

// PRIMER
function Primer({dark,onDismiss}){
  const steps=[
    {icon:'🏭',title:'The Big Idea',text:'This app teaches the urinary system using a factory analogy. Your kidneys are twin water treatment plants — they take in dirty blood, filter it, reclaim the good stuff, and flush the waste. Every label in "Simple" mode uses this analogy.'},
    {icon:'🔀',title:'Jargon Toggle',text:'The switch in the header flips the ENTIRE app between "Simple" (13-year-old friendly analogies) and "Academic" (proper clinical terminology). Use Simple to understand concepts, Academic to learn the real names.'},
    {icon:'🗺️',title:'System Map',text:'Interactive clickable diagrams of the whole kidney and the nephron (the microscopic filtering unit). Tap any structure to learn what it does.'},
    {icon:'📂',title:'Deep Directory',text:'A file-tree style knowledge base. Every organ, function, hormone, and clinical condition — expandable and searchable. Click any leaf to read the full explanation.'},
    {icon:'⚡',title:'Process Flow',text:'Animated flowcharts showing how things actually happen step-by-step: normal filtration, dehydration response, blood pressure rescue (RAAS), acid-base correction, and EPO. Pick a scenario and watch the cascade.'},
    {icon:'🧪',title:'Clinical Lab',text:'Urine analysis table, GFR staging for kidney disease, and a UTI breakdown comparing male vs female anatomy. The stuff that shows up on exams.'},
    {icon:'✏️',title:'Canvas',text:'A drawing pad with challenges. Draw processes from memory to prove you actually understand the "why" behind the "what." Best way to study.'},
  ];
  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.6)',backdropFilter:'blur(6px)'}}>
      <div className={`primer-card w-full max-w-lg max-h-[85vh] overflow-y-auto rounded-2xl p-6 ${dark?'bg-slate-900 border border-slate-700':'bg-white border border-slate-200'}`}>
        <div className="flex items-center gap-3 mb-4">
          <div className="h-3 w-3 rounded-full bg-teal-500" style={{boxShadow:'0 0 12px rgba(13,148,136,.8)'}}/>
          <h2 className="text-lg font-display font-bold text-teal-400">Welcome to the Urinary System Hub</h2>
        </div>
        <p className={`text-sm mb-5 leading-6 ${dark?'text-slate-400':'text-slate-500'}`}>
          Think of your kidneys as a city's water treatment plant. Blood flows in dirty, gets filtered through a million tiny processing units (nephrons), and leaves clean — with waste flushed out as urine. Here's what each section of this app covers:
        </p>
        <div className="flex flex-col gap-1">
          {steps.map((s,i)=>(
            <div key={i} className="primer-step">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-base">{s.icon}</span>
                <span className={`text-xs font-bold ${dark?'text-slate-200':'text-slate-700'}`}>{s.title}</span>
              </div>
              <p className={`text-xs leading-5 ${dark?'text-slate-400':'text-slate-500'}`}>{s.text}</p>
            </div>
          ))}
        </div>
        <button onClick={onDismiss}
          className="mt-5 w-full py-2.5 rounded-xl text-sm font-semibold bg-teal-500 text-white hover:bg-teal-600 tr">
          Got it, let's go
        </button>
        <p className={`text-center text-xs mt-2 ${dark?'text-slate-600':'text-slate-400'}`}>You can reopen this from the header anytime</p>
      </div>
    </div>
  );
}

const MACRO={
  cortex:{lbl:'Cortex',col:'#0d9488',ac:{n:'Renal Cortex',d:'Outer layer of the kidney. Contains glomeruli, PCT and DCT. Where filtration and most reabsorption begins. Each kidney has ~1 million nephrons.'},si:{n:'The Outer Ring',d:'The outer factory floor. All 1 million tiny filtering nets live here. This is where blood first gets squeezed through the filter.'}},
  medulla:{lbl:'Medulla',col:'#7c3aed',ac:{n:'Renal Medulla / Pyramids',d:'Inner region of 8-18 renal pyramids. Contains Loops of Henle and collecting ducts. Maintains the hyperosmotic gradient needed to concentrate urine. Gets saltier the deeper you go.'},si:{n:'The Deep Engine Room',d:'The salty core. Salt pumps (loops of Henle) work hard down here making the environment super salty - which automatically sucks water out of passing filtrate.'}},
  calyces:{lbl:'Calyces',col:'#f59e0b',ac:{n:'Minor and Major Calyces',d:'Cup-shaped chambers. 8-18 minor calyces collect urine draining from each renal papilla. Minor calyces merge into 2-3 major calyces, which pour into the renal pelvis.'},si:{n:'The Funnel Network',d:'Tiny cups catch drips from each pyramid tip. Small cups pour into bigger cups, all funnelling toward the main exit drain.'}},
  pelvis:{lbl:'Pelvis',col:'#f97316',ac:{n:'Renal Pelvis',d:'Large funnel-shaped chamber collecting urine from all major calyces. Narrows into the ureter. Last stop inside the kidney.'},si:{n:'The Central Tank',d:'The main collection basin. All processed waste pools here before being pumped out through the export pipe (ureter).'}},
  ureter:{lbl:'Ureter',col:'#06b6d4',ac:{n:'Ureter',d:'Two muscular tubes (~25 cm) carrying urine from each kidney to the bladder by peristalsis (wave-like muscle contractions). Enter bladder at an oblique angle - acts as one-way valve preventing backflow.'},si:{n:'Export Pipe',d:'Muscular tube that squeezes urine downward like toothpaste. Enters the bladder at an angle so when bladder pressure rises it pinches shut - built-in anti-backflow valve.'}},
  capsule:{lbl:'Capsule',col:'#64748b',ac:{n:'Renal Capsule',d:'Tough fibrous membrane encasing the kidney. Protects against trauma and infection. The shiny white outer layer you see when dissecting a kidney.'},si:{n:'The Protective Shell',d:"The kidney's tough outer skin - like a plastic case keeping the delicate factory machinery inside safe from bumps and bacteria."}},
  pyramid:{lbl:'Pyramid',col:'#dc2626',ac:{n:'Renal Pyramid',d:'Triangular striated structures in the medulla. 8-18 per kidney. Contain loops of Henle and collecting ducts arranged in parallel. Striations are tubules running toward the papilla tip. The countercurrent gradient runs along their length — saltiest at the tip.'},si:{n:'Salt Gradient Towers',d:'Triangular wedge-shaped structures packed with parallel loops and ducts running toward the tip. The deeper you go, the saltier it gets — this salt gradient is what pulls water out of filtrate. Like stacking salt layers in a tower.'}},
  artery:{lbl:'R. Artery',col:'#ef4444',ac:{n:'Renal Artery',d:'Branch of abdominal aorta delivering ~20-25% of cardiac output (~1.2 L/min) to each kidney. Enters at hilum, branches: segmental → interlobar → arcuate → cortical radiate → afferent arterioles feeding each glomerulus.'},si:{n:'Main Blood Pipe In',d:"Huge artery delivering ~20% of all your heart pumps — straight into the kidney. Branches like a tree: big trunk → medium branches → tiny twigs → each twig feeds one glomerulus. That's a LOT of blood for two small organs."}},
  vein:{lbl:'R. Vein',col:'#3b82f6',ac:{n:'Renal Vein',d:'Carries filtered blood from kidney back to inferior vena cava. Follows reverse branching: cortical radiate veins → arcuate → interlobar → renal vein. Left renal vein is longer, passes between aorta and superior mesenteric artery (Nutcracker syndrome).'},si:{n:'Clean Blood Pipe Out',d:'Takes the cleaned blood back to the main highway (inferior vena cava). Mirrors the artery branching in reverse. The left one is longer and can get squeezed between two other vessels — called Nutcracker syndrome.'}},
  hilum:{lbl:'Hilum',col:'#78716c',ac:{n:'Renal Hilum',d:"Medial indentation where renal artery, renal vein, ureter, lymphatics, and nerves enter/exit the kidney. The kidney's gateway. Protected within renal sinus filled with fat tissue."},si:{n:'The Loading Dock',d:'The one entry/exit point on the kidney. Blood in (artery), blood out (vein), urine out (ureter), plus nerves and lymph vessels all pass through this notch. Surrounded by protective fat padding.'}},
  papilla:{lbl:'Papilla',col:'#fb923c',ac:{n:'Renal Papilla',d:'The tip (apex) of each renal pyramid projecting into a minor calyx. Contains openings of collecting ducts (area cribrosa) where final urine drips into the calyx. Damaged in papillary necrosis (diabetes, sickle cell, NSAIDs).'},si:{n:'The Drip Tip',d:'The pointy end of each pyramid poking into a tiny cup (minor calyx). Tiny holes here let finished urine drip out of the collecting ducts. Damage from diabetes or painkillers blocks urine drainage.'}},
  column:{lbl:'Column',col:'#a3a3a3',ac:{n:'Renal Column (of Bertin)',d:'Extensions of cortical tissue dipping between adjacent pyramids. Contain interlobar blood vessels and connective tissue. Separate and support individual pyramids structurally.'},si:{n:'The Dividing Walls',d:'Cortex tissue that reaches down between pyramids like walls between slices of pie. Blood vessels run through these walls to supply different kidney sections. They keep pyramids separated and supported.'}},
  interlobar:{lbl:'Interlobar Art.',col:'#f87171',ac:{n:'Interlobar Arteries & Veins',d:'Run between renal pyramids through the renal columns. Branch from segmental arteries (off the renal artery) and travel toward the corticomedullary junction where they arch into arcuate arteries. Interlobar veins mirror the arterial path, draining into the renal vein.'},si:{n:'The Column Roads',d:'Blood vessels running between pyramids like highways between city blocks. They carry blood deeper into the kidney, branching smaller and smaller until they reach the junction where the outer and inner zones meet.'}},
  arcuate:{lbl:'Arcuate Art.',col:'#fbbf24',ac:{n:'Arcuate Arteries & Veins',d:'Arc along the corticomedullary junction (the border between cortex and medulla). Branch from interlobar arteries and give rise to cortical radiate arteries that ascend into the cortex to feed afferent arterioles of individual nephrons. Arcuate veins run parallel, draining the cortex.'},si:{n:'The Curved Ring Roads',d:'Curved vessels that sit right at the border between the outer and inner kidney zones. They arch over each pyramid base and send smaller branches upward into the cortex — like ring roads distributing traffic to every neighbourhood (nephron).'}},
  interlobular:{lbl:'Interlobular Art.',col:'#fca5a5',ac:{n:'Interlobular (Cortical Radiate) Arteries',d:'Finest named branches of the renal arterial tree. Arise from arcuate arteries and radiate outward through the cortex toward the capsule. Each gives off multiple afferent arterioles, each supplying one glomerulus. Also called cortical radiate arteries. Collectively supply all ~1 million nephrons.'},si:{n:'The Final Delivery Roads',d:'The smallest named arteries before blood reaches individual nephrons. They fan out through the outer kidney like spokes of a wheel — each spoke drops off blood at multiple nephron doorsteps. Last step before filtration actually begins.'}},
  minor_calyx:{lbl:'Minor Calyx',col:'#fcd34d',ac:{n:'Minor Calyx',d:'Small cup-shaped chamber collecting urine dripping from one renal papilla. 8–18 per kidney, one per pyramid. Lined with transitional epithelium (urothelium) that stretches as urine accumulates. Minor calyces converge to form major calyces. Dilation = hydronephrosis, often from a stone blocking the ureteropelvic junction.'},si:{n:'The Little Catching Cups',d:'A tiny cup-shaped collector at each pyramid tip — like a shot glass catching drips from a tap. One cup per pyramid, 8–18 total. When a kidney stone blocks the exit, these cups balloon up with backed-up urine.'}},
  major_calyx:{lbl:'Major Calyx',col:'#f59e0b',ac:{n:'Major Calyx',d:'Larger collecting chamber formed by 3–4 minor calyces merging. 2–3 major calyces per kidney. Funnel urine into the renal pelvis. Visible on imaging — dilated major calyces on ultrasound or CT indicate downstream obstruction (hydronephrosis, stone, tumour).'},si:{n:'The Big Collection Bucket',d:'Every 3–4 small cups pour into a bigger bucket (major calyx). 2–3 per kidney. They all drain into the main tank (renal pelvis). On an ultrasound or CT scan, blocked major calyces look like black balloons filling with urine.'}},
  inf_capsule:{lbl:'Inf. Capsule',col:'#94a3b8',ac:{n:'Inferior Renal Capsule',d:'Lower portion of the fibrous renal capsule. The capsule is a tough, fibrous envelope encasing the entire kidney, continuous throughout. The inferior pole region is clinically relevant — it\'s the most accessible to biopsy under ultrasound guidance, and the first area palpable on abdominal exam in nephroptosis (kidney dropping on standing).'},si:{n:'Bottom of the Shell',d:"The lower part of the kidney's tough outer casing. This end points downward and is the easiest to reach by needle for a biopsy, since it can be accessed from the back without hitting major organs."}},
  sup_capsule:{lbl:'Sup. Capsule',col:'#64748b',ac:{n:'Superior Renal Capsule',d:'Upper portion of the fibrous renal capsule, at the superior pole. The right adrenal gland sits directly on the superior pole of the right kidney; the left adrenal is slightly more medial. Trauma to the superior pole can injure the adrenal simultaneously. The capsule here is tethered by the suprarenal artery branches.'},si:{n:'Top of the Shell',d:"The upper tip of the kidney's outer casing. The adrenal gland (your emergency hormone factory) sits right on top of this. A bad kidney injury up here can also damage the adrenal — two problems at once."}},
  nephron:{lbl:'Nephron',col:'#0d9488',ac:{n:'Nephron — The Functional Unit',d:'The structural and functional unit of the kidney. Each kidney contains ~1 million nephrons. Each nephron consists of the renal corpuscle (glomerulus + Bowman\'s capsule), PCT, Loop of Henle, DCT, and connecting tubule to the collecting duct. Two types: cortical nephrons (85%, short loops) and juxtamedullary nephrons (15%, long loops — responsible for concentrated urine). You can lose up to 75% before kidney failure is apparent.'},si:{n:'The Whole Filter Machine',d:"One complete kidney-processing unit. You have ~1 million of them per kidney. Think of each nephron as one full water treatment line — from intake (glomerulus) through all the processing steps (tubules) to output (collecting duct). You can destroy 750,000 of these and still function fine. That's why kidney disease is silent until it's serious."}},
};

const MICRO={
  bowman:{lbl:"Bowman's",col:'#0ea5e9',ac:{n:"Bowman's Capsule",d:"Cup-shaped double-walled structure surrounding the glomerulus. Collects filtrate squeezed from glomerular capillaries. Together with glomerulus = renal corpuscle. Filtrate passes from here into the PCT."},si:{n:'The Catching Cup',d:"A tiny cup wrapping around the pressure mesh. Whatever gets blasted through the filter drips into this cup - it's the very start of the nephron pipeline."}},
  glomerulus:{lbl:'Glomerulus',col:'#ef4444',ac:{n:'Glomerulus',d:'Ball of fenestrated (leaky) capillaries under high pressure. Afferent arteriole (wider) feeds in, efferent (narrower) drains out - pressure difference forces filtrate through. Podocytes with filtration slits = last barrier. GFR = 125 mL/min = 180 L/day. Proteins and blood cells are too large - they stay in blood.'},si:{n:'The Pressure Mesh',d:"Like putting your thumb over a garden hose. Blood enters through a wide pipe and exits through a narrower one - pressure blasts water, salts, glucose and waste through leaky walls. Proteins and red blood cells are too big - they stay. Your entire blood supply is filtered every 40 minutes!"}},
  pct:{lbl:'PCT',col:'#10b981',ac:{n:'Proximal Convoluted Tubule (PCT)',d:"First tubule after Bowman's capsule. Reabsorbs: ALL glucose (if blood glucose too high, transporters get overwhelmed = glycosuria), ALL amino acids, ALL vitamins, most electrolytes, 60-70% of water (osmosis). Dense microvilli maximise surface area. Also converts vitamin D to calcitriol. Not under hormonal control."},si:{n:'The Greedy Reclaimer',d:'The first and hungriest section. Sucks back 100% of sugar (diabetes overwhelms these transporters = sugar in urine), all protein building blocks, all vitamins, most salts, and 60-70% of water. No hormones needed - always does maximum effort.'}},
  desc_loop:{lbl:'Desc. Loop',col:'#3b82f6',ac:{n:'Descending Loop of Henle',d:'Dips into medulla. Permeable to WATER, not solutes. Water exits by osmosis into the hyperosmotic medullary environment. ~20% more water reabsorbed here. By bottom of loop ~90% of filtered water is recovered total.'},si:{n:'The Water Slide',d:'The pipe dives into the salty core. Walls are leaky to water only - water drains out passively by osmosis. By the U-turn at the bottom, 90% of water is back in the blood. Filtrate is now thick and concentrated.'}},
  asc_loop:{lbl:'Asc. Loop',col:'#8b5cf6',ac:{n:'Ascending Loop of Henle',d:'Returns to cortex. IMPERMEABLE to water. Actively pumps Na+, K+, Cl- out into the medullary interstitium - creates the hyperosmotic gradient that drives water out of the descending loop. This is the countercurrent multiplier. Target of loop diuretics (furosemide).'},si:{n:'The Salt Pumper',d:'The return pipe is waterproof. Instead of water, it pumps salts (Na+, K+, Cl-) out into surrounding tissue making the medulla super salty. That saltiness is what pulled water out of the descending limb. The two loops work as a team - the countercurrent multiplier.'}},
  dct:{lbl:'DCT',col:'#f59e0b',ac:{n:'Distal Convoluted Tubule (DCT)',d:'Hormone-controlled fine-tuning zone. Aldosterone: reabsorbs Na+ (water follows, raises BP). Acid/base balance: acidosis - secretes H+ into DCT, reabsorbs HCO3-. Alkalosis - secretes HCO3-, reabsorbs H+. Also secretes ammonia, drugs, toxins.'},si:{n:'The Smart Adjuster',d:'Unlike the PCT (always the same), the DCT takes hormone orders. Aldosterone: grab more salt, water follows, BP rises. Too acidic? Eject H+ ions. Too basic? Eject bicarbonate. Got toxins? Secret them out here.'}},
  collecting:{lbl:'Collecting Duct',col:'#06b6d4',ac:{n:'Collecting Duct',d:'ADH (from posterior pituitary) makes walls permeable via aquaporins - water reabsorbed - concentrated dark urine. No ADH = dilute pale urine. Drains into papilla then minor calyx. 180 L filtered per day - only 1.5-2 L exits as urine.'},si:{n:'The Final Volume Boss',d:'Dehydrated? Brain sends ADH hormone which opens secret water channels (aquaporins) in the duct wall - water floods back into blood, pee becomes tiny and dark. Well hydrated? No ADH, water stays in tube, pee is pale. 180 litres filtered, ~1.5 litres actually leave your body!'}},
  vasa_recta:{lbl:'Vasa Recta',col:'#e11d48',ac:{n:'Vasa Recta',d:'Hairpin capillary loops running parallel to the Loop of Henle. Exchange solutes and water passively (countercurrent exchange) without washing away the medullary gradient. Deliver nutrients and O2 to medullary tissue.'},si:{n:'The Coolant Loops',d:'Blood vessel loops running alongside the salt pumps. They carry away reabsorbed fluid without destroying the salty gradient the loop of Henle worked so hard to build. Like a balanced heat exchanger.'}},
  afferent:{lbl:'Afferent Art.',col:'#ef4444',ac:{n:'Afferent Arteriole',d:'Wider arteriole feeding blood INTO the glomerulus from cortical radiate artery. Its wider diameter creates high hydrostatic pressure in glomerulus, driving filtration. Contains JG cells (renin-secreting) and can constrict/dilate to autoregulate GFR.'},si:{n:'The Wide Pipe In',d:"The wider input pipe to the pressure mesh. Because it's wider than the output pipe (efferent), pressure builds up inside the glomerulus — like putting your thumb partially over a hose. Contains the pressure-sensing JG cells that start the RAAS alarm when BP drops."}},
  efferent:{lbl:'Efferent Art.',col:'#f87171',ac:{n:'Efferent Arteriole',d:'Narrower arteriole draining blood FROM the glomerulus. Its smaller diameter maintains high glomerular pressure. Gives rise to peritubular capillaries (cortex) or vasa recta (juxtamedullary nephrons). ACE inhibitors dilate efferent arteriole, reducing glomerular pressure — protects kidneys in CKD.'},si:{n:'The Narrow Pipe Out',d:"The narrower exit pipe from the pressure mesh. Because it's narrower than the input, it acts like a dam — keeping pressure high inside so filtration keeps happening. Then branches into a second capillary network that picks up reabsorbed stuff."}},
  peritubular:{lbl:'Peritubular Cap.',col:'#fb923c',ac:{n:'Peritubular Capillaries',d:'Low-pressure capillary network surrounding PCT and DCT in cortex. Arises from efferent arteriole. Absorbs reabsorbed substances (water, glucose, ions) from tubular cells back into blood. Low hydrostatic + high oncotic pressure favors reabsorption.'},si:{n:'The Reclaim Network',d:'A web of tiny blood vessels wrapping around the tubules. After blood leaves the glomerulus through the narrow pipe, it enters these low-pressure capillaries. Their job: pick up everything the tubules reabsorb (water, sugar, salts) and return it to the bloodstream.'}},
  jga:{lbl:'JGA',col:'#a78bfa',ac:{n:'Juxtaglomerular Apparatus (JGA)',d:'Pressure-sensing alarm unit where the DCT loops back and contacts its own afferent arteriole. Three components: (1) JG cells — modified smooth muscle in afferent arteriole wall, secrete RENIN when BP drops or SNS activates; (2) Macula densa — specialized DCT cells detecting low NaCl flow, signal JG cells to release renin; (3) Extraglomerular mesangium — support cells. Together they trigger the RAAS cascade (renin → angiotensin I → ACE → angiotensin II → aldosterone) to rescue blood pressure.'},si:{n:'The Alarm System',d:"A tiny sensor cluster where your distal tube touches its own blood supply pipe. Two sensors in one: the JG cells feel blood pressure drop in the artery, and the macula densa cells feel low salt flow in the tube. Either trigger = fire renin alarm = start the RAAS chain reaction = blood pressure climbs back up. It's the kidney's 911 call center."}},
  cortical_collect:{lbl:'Cortical Coll. Tube',col:'#22d3ee',ac:{n:'Cortical Collecting Tubule',d:'Initial segment of the collecting system, located in the cortex. Connects the DCT to the medullary collecting duct. Also responds to aldosterone (Na+ reabsorption, K+ secretion) and ADH (aquaporin insertion). Histologically has principal cells (Na+/K+ exchange) and intercalated cells (acid-base regulation). Distinct from the medullary collecting duct in its embryological origin (ureteric bud vs. metanephric mesenchyme).'},si:{n:'The First Exit Corridor',d:"The hallway connecting the processing area (DCT) to the final exit pipe (collecting duct). Still under hormone control — aldosterone adjusts salt here, ADH adjusts water. Think of it as the last checkpoint before urine hits the highway."}},
  loop_henle:{lbl:'Loop of Henle',col:'#6366f1',ac:{n:'Loop of Henle',d:'U-shaped tubule dipping from cortex into medulla and back. Two functional limbs: descending (permeable to water only — water leaves by osmosis) and ascending (impermeable to water — pumps Na+/K+/Cl- out). Together = the countercurrent multiplier. Creates and maintains the medullary osmotic gradient (300 → 1200 mOsm/kg from cortex to papilla tip) that drives passive water reabsorption in the collecting duct. Loop diuretics (furosemide) block the Na-K-2Cl transporter in the ascending limb.'},si:{n:'The U-Turn Salt-Water Trick',d:"A U-shaped pipe that does a clever trick: the down side leaks water out (into salty surroundings), the up side pumps salt out (without letting water follow). The two sides work together to make the core of the kidney saltier and saltier the deeper you go. That salt gradient is what lets ADH concentrate your urine later — no gradient, no concentrated pee."}},
  arcuate_vein:{lbl:'Arcuate Vein',col:'#60a5fa',ac:{n:'Arcuate Vein',d:'Drains deoxygenated blood from the cortex at the corticomedullary junction, running parallel to the arcuate artery. Collects from interlobular (cortical radiate) veins above and vasa recta ascending from the medulla. Drains into interlobar veins → renal vein → inferior vena cava. The arcuate vein is the venous counterpart of the arcuate artery at the same anatomical level.'},si:{n:'The Curved Return Road',d:"The return lane of the curved highway at the cortex-medulla border. After blood has delivered oxygen to the kidney tissue and been filtered, it travels back through this vein toward the renal vein and then back to the heart. The artery and vein run side-by-side like a two-way highway."}},
  arcuate_art:{lbl:'Arcuate Artery',col:'#fb923c',ac:{n:'Arcuate Artery',d:'Branch of the interlobar artery, arching along the corticomedullary junction over the base of each renal pyramid. Gives rise to interlobular (cortical radiate) arteries ascending into the cortex. Supplies afferent arterioles of cortical and juxtamedullary nephrons. Also gives off vasa recta for juxtamedullary nephrons. Key landmark on Doppler ultrasound — resistive index (RI) measured here reflects renal vascular resistance.'},si:{n:'The Curved Main Road',d:"A curved artery that sits right at the border between the outer and inner zones of the kidney, arching over each pyramid. It sends branches upward into the cortex to feed nephrons and downward to supply the inner kidney. On an ultrasound with colour Doppler, you can actually see blood pulsing through these curved arteries."}},
};

const DIR={
  "Organs":{
    "Kidneys":{ac:{n:'Kidneys',d:'Two bean-shaped organs (~11 cm), retroperitoneal (behind peritoneum). Left sits slightly higher. Receive 20-25% of cardiac output (~1.2 L/min). Each has ~1 million nephrons. Produce 1.5-2 L urine per day from 180 L filtered plasma.'},si:{n:'The Twin Filtration Plants',d:'Two bean-shaped factories behind your stomach. Each contains ~1 million microscopic filters. Every 40 minutes they clean your entire blood supply - like filtering an Olympic swimming pool every single day.'}},
    "Ureters":{ac:{n:'Ureters',d:'Two fibromuscular tubes (~25 cm). Transport urine from renal pelvis to bladder via peristalsis. Enter bladder obliquely - acts as valve preventing vesicoureteral reflux (backflow of urine into kidneys).'},si:{n:'Export Pipes',d:'Squeeze urine downward with wave-like muscle contractions like squeezing toothpaste. Enter the bladder at an angle so filling pressure pinches them shut - built-in anti-backflow system.'}},
    "Urinary Bladder":{ac:{n:'Urinary Bladder',d:'Smooth collapsible muscular sac. Capacity ~500 mL. Located on pelvic floor behind pubic symphysis. Males: anterior to rectum, prostate surrounds bladder neck. Females: anterior to vagina and uterus. Trigone (triangle at base between 2 ureteral openings and urethral exit) = infection-prone zone - bacteria persist here (cystitis, thrush).'},si:{n:'The Holding Tank',d:"A muscular balloon storing up to 500 mL. In men the prostate wraps around the drain at the bottom - enlarged prostate means can't pee. The trigone triangle at the base is where UTI bacteria love to hide - hard to flush out."}},
    "Urethra":{ac:{n:'Urethra',d:'Tube from bladder to outside. Male ~20 cm, female ~4 cm. Two sphincters: Internal (smooth muscle, involuntary - ANS-controlled) and External (skeletal muscle, voluntary - conscious control). Female short urethra + proximity to anus = much higher UTI risk.'},si:{n:'The Exit Pipe',d:"The final drain. Women have a 4 cm pipe, men have 20 cm - main reason women get way more UTIs. Two doors guard the exit: auto inner door (can't control it, ANS runs it) and manual outer door (you control this - toilet training is learning to control skeletal muscle)."}},
  },
  "Kidney Functions":{
    "Excretory":{ac:{n:'Excretory Function',d:'Filters 180 L plasma per day. Excretes: urea (protein metabolism), uric acid (nucleic acid metabolism), creatinine (muscle creatine metabolism), excess water, ions, drugs, toxins. Only 1-2 L exits as urine. Kidneys reclaim more than 99% of filtered substances.'},si:{n:'The Garbage Collector',d:'Every day 180 litres of blood plasma gets screened. Waste products (urea from broken-down protein, uric acid from DNA metabolism, creatinine from muscles) get removed. The genius: 99% of the good stuff is saved. Only ~1.5 L of actual waste leaves as pee.'}},
    "Regulatory":{ac:{n:'Regulatory Function',d:'Regulates: (1) Plasma fluid volume and osmolarity, (2) Electrolyte concentrations (Na+, K+, Ca2+, Cl-, HCO3-), (3) Blood pH via H+ and HCO3- - only organ that can fully correct acid/base, (4) Blood pressure via RAAS and urine output, (5) RBC count via EPO.'},si:{n:'The Body Control Panel',d:"The kidneys are the body's master thermostat. They control: how much water is in your blood, what salts it contains, whether blood is too acidic or basic, your blood pressure, and even how many red blood cells you make."}},
    "Vitamin D Activation":{ac:{n:'Metabolic: Vitamin D to Calcitriol',d:'Skin makes inactive vitamin D (cholecalciferol) from sunlight. Liver converts to calcidiol. Kidney PCT cells convert calcidiol to CALCITRIOL (active hormone). Calcitriol: increases Ca2+ and phosphate gut absorption, reduces cancer risk, protects cardiovascular health, reduces dementia risk, boosts immunity, reduces inflammation, regulates blood glucose.'},si:{n:'The Vitamin D Factory',d:"Vitamin D from sunlight is like a flat-pack table - not assembled yet. Liver does some work, then kidneys do the final step to make it actually work (calcitriol). Active vitamin D: absorbs calcium for bones, fights cancer, protects heart and brain, boosts immune system. Without working kidneys, vitamin D can't be activated."}},
    "EPO and RBC Control":{ac:{n:'Metabolic: Erythropoietin (EPO)',d:'EPOS cells in kidney cortex detect low blood O2 (hypoxia). Release EPO (erythropoietin). EPO travels to red bone marrow - stimulates erythrocyte production - more RBCs - more O2 transport - negative feedback reduces EPO. Basis of EPO doping in sport. Therapeutically used in CKD anaemia.'},si:{n:'The Red Blood Cell Boss',d:'If oxygen drops (altitude, anaemia), kidney EPOS cells release EPO hormone. EPO tells bone marrow: make more red blood cells urgently! More RBCs = more oxygen = problem solved = alarm switches off. Tour de France cyclists used to illegally inject this to boost RBC count and endurance.'}},
  },
  "The Nephron":{
    "Renal Corpuscle":{
      "Glomerulus":{ac:{n:'Glomerulus',d:'Fenestrated capillary tuft under high hydrostatic pressure (afferent arteriole wider than efferent). Podocytes with filtration slits are the final barrier. GFR = 125 mL/min = 180 L/day. Filters everything except large proteins and blood cells.'},si:{n:'The Pressure Filter',d:'Blood in through a wide pipe, out through a narrower pipe - pressure skyrockets and forces everything small through the leaky capillary walls. Proteins and red blood cells are too large. A coffee mug of plasma is cleaned every single minute.'}},
      "Podocytes":{ac:{n:'Podocytes',d:'Specialised epithelial cells with finger-like pedicles wrapping glomerular capillaries. Gaps between pedicles = filtration slits. Final barrier against protein leakage. Podocyte damage leads to proteinuria.'},si:{n:'The Grabby Tentacles',d:'Cells with finger-like arms gripping the outside of the capillary. Tiny gaps between fingers = last filter. Damage these and protein leaks into urine (proteinuria) - a red flag for kidney disease.'}},
      "Bowmans Capsule":{ac:{n:"Bowman's Capsule",d:"Double-walled cup surrounding glomerulus. Inner layer = podocytes. Urinary space between layers collects filtrate. Filtrate flows into PCT. Glomerulus + Bowman's capsule = renal corpuscle."},si:{n:"Bowman's Capsule",d:'The cup surrounding the pressure filter. Whatever gets blasted through the mesh drips into this cup. From here, filtrate begins its journey down the nephron pipeline.'}},
    },
    "PCT":{ac:{n:'Proximal Convoluted Tubule (PCT)',d:'First tubule, in cortex. Microvilli brush border maximises surface area. Reabsorbs ALL glucose (SGLT2 transporters - saturation causes glycosuria), ALL amino acids, ALL vitamins, most electrolytes, 60-70% water. Converts vitamin D to calcitriol. Always constant - not hormonal.'},si:{n:'Greedy Reclaim Belt',d:'The hungriest section. Grabs back all sugar (diabetes overwhelms transporters = sugar in pee), all protein building blocks, all vitamins, most salts, and 60-70% of water. No hormone orders - always does maximum effort.'}},
    "Descending Loop":{ac:{n:'Descending Loop of Henle',d:'Dips into medulla. Permeable to water ONLY. Water exits by osmosis into hyperosmotic medulla. ~20% more water reclaimed. ~90% of filtered water recovered by end of descending loop.'},si:{n:'Water Slide Down',d:'Tube dives into the salty core. Walls leaky to water only - water drains out passively. 90% of water is back in the blood by the U-turn. Filtrate is now very concentrated.'}},
    "Ascending Loop":{ac:{n:'Ascending Loop of Henle',d:'Returns to cortex. Impermeable to water. Actively pumps Na+, K+, Cl- out - builds medullary hyperosmotic gradient. This is the countercurrent multiplier. Loop diuretics (furosemide) block this pump - less reabsorption - more urine.'},si:{n:'Salt Pumper Going Up',d:'Waterproof return pipe. Pumps salts out into surrounding tissue making it super salty. That salt gradient is what pulled water out of the descending limb. The two loops work as a team: the countercurrent multiplier.'}},
    "DCT":{ac:{n:'Distal Convoluted Tubule (DCT)',d:'In cortex. Hormone-regulated unlike PCT. Aldosterone: reabsorbs Na+ from DCT (water follows, raises BP). Acid/base: acidosis - secretes H+, reabsorbs HCO3-. Alkalosis - secretes HCO3-, reabsorbs H+. Also secretes ammonia, drugs, toxins. Aldosterone causes Na+ reabsorption AND K+ secretion simultaneously.'},si:{n:'Smart Adjuster',d:"Takes hormone orders. Aldosterone says: suck more salt in (water follows, BP rises, K+ gets kicked out). Blood too acidic? Eject H+ ions. Blood too basic? Eject bicarbonate. Got toxins? Secret them out. The body's chemistry correction station."}},
    "Collecting Duct":{ac:{n:'Collecting Duct',d:'ADH from posterior pituitary inserts aquaporin channels into walls - water reabsorbed - concentrated urine. No ADH = dilute urine. Drains into renal papilla. 180 L filtered daily leads to only 1.5-2 L urine.'},si:{n:'Final Volume Boss',d:'Dehydrated? Brain sends ADH - opens water channels (aquaporins) in duct wall - water floods back into blood - dark concentrated pee. Well hydrated? No ADH - water stays - pale pee. 180 litres filtered, ~1.5 litres leave as pee!'}},
  },
  "Hormones":{
    "ADH":{ac:{n:'ADH (Anti-Diuretic Hormone)',d:'Released from POSTERIOR PITUITARY when osmoreceptors in hypothalamus detect high plasma osmolarity (dehydration - cells shrink). ADH travels to collecting duct - opens aquaporins - more water reabsorbed - small dark urine. Plasma osmolarity falls - negative feedback stops ADH.'},si:{n:'The Water-Saver Alarm',d:"When blood gets too thick (dehydration), shrink sensors in the hypothalamus fire an alarm. ADH hormone travels from pituitary to collecting duct and opens water doors (aquaporins). Water floods back into blood. Pee goes dark and small. Once blood is diluted the alarm switches off."}},
    "Aldosterone":{ac:{n:'Aldosterone',d:'Steroid from ADRENAL CORTEX. Released in response to low Na+, high K+, or angiotensin II (RAAS). Action: stimulates Na+ reabsorption in DCT via Na/K-ATPase - water follows - increases blood volume and BP. Also causes K+ secretion. Na+ and K+ must stay in balance.'},si:{n:'The Salt Commander',d:"Hormone from adrenal gland (sitting on top of kidneys) that yells at the DCT: absorb more salt! Water follows salt - blood volume increases - blood pressure rises. K+ gets kicked out into the tube to balance. Low sodium or low blood pressure triggers aldosterone release."}},
    "Angiotensin II":{ac:{n:'Angiotensin II',d:'Produced via RAAS cascade: Low BP - JG cells release renin - renin cleaves angiotensinogen - angiotensin I - ACE in lungs converts to angiotensin II. Five effects: (1) Vasoconstriction raises BP, (2) Stimulates aldosterone - Na+ retention, (3) Stimulates ADH - water retention, (4) Stimulates thirst, (5) Stimulates noradrenaline - vasoconstriction. ACE inhibitors block this step.'},si:{n:'The Blood Pressure Boss',d:'When BP drops, the kidneys start a chemical chain: renin - angiotensin I - lungs convert - angiotensin II. This boss hormone does 5 things at once: squeezes blood vessels, orders adrenals to grab more salt (aldosterone), tells pituitary to save water (ADH), makes you thirsty, and releases adrenaline-like chemicals (noradrenaline). All raise BP.'}},
    "Renin":{ac:{n:'Renin',d:'Enzyme from JUXTAGLOMERULAR (JG) cells in the wall of the afferent arteriole. Released when: low arteriole pressure, low Na+ in filtrate (detected by macula densa cells), or sympathetic nervous system activation. Cleaves angiotensinogen into angiotensin I. First step of RAAS.'},si:{n:'The Alarm Trigger',d:"Pressure sensor in the kidney's input blood vessel. When it senses low pressure it releases renin - an enzyme that kicks off the entire RAAS blood-pressure-raising chain reaction. The first domino."}},
    "EPO":{ac:{n:'Erythropoietin (EPO)',d:'Glycoprotein hormone from EPOS cells in kidney cortex. Released in response to hypoxia (low O2). Travels to RED BONE MARROW - stimulates RBC (erythrocyte) production - more O2 transport - negative feedback reduces EPO. Used illegally in sports, therapeutically in CKD anaemia.'},si:{n:'RBC Factory Signal',d:'Oxygen sensor cells in kidney notice low O2 and release EPO hormone. EPO tells bone marrow: MAKE MORE RED BLOOD CELLS NOW. More RBCs = more oxygen = problem fixed = EPO production slows. Athletes illegally inject this to boost RBC count and endurance.'}},
    "Calcitriol":{ac:{n:'Calcitriol (Active Vitamin D)',d:'Skin makes cholecalciferol from sunlight. Liver makes calcidiol. Kidney PCT converts calcidiol to CALCITRIOL. Functions: enhances Ca2+ and phosphate gut absorption, reduces cancer risk, protects cardiovascular and brain health, immune modulation, anti-inflammatory, regulates blood glucose.'},si:{n:'Vitamin D Finished Product',d:'The kidney does the final assembly step to make vitamin D actually work. Active vitamin D tells your gut to absorb calcium (bones need it), fights cancer, protects heart and brain, keeps immunity strong. Without healthy kidneys, vitamin D cannot be activated.'}},
  },
  "Micturition":{
    "Involuntary Reflex":{ac:{n:'Micturition Reflex (Involuntary Phase)',d:'1. Bladder fills with urine - walls stretch. 2. Stretch receptors detect distension. 3. Sensory signal to micturition centre in spinal cord. 4. Parasympathetic signal via pelvic nerves - detrusor muscle contracts and internal sphincter opens. 5. Signal also goes to PONS creating conscious urge.'},si:{n:'The Automatic Alarm',d:"Bladder stretches - stretch sensors in walls fire - signal goes to spinal cord - automatic: bladder walls start squeezing (detrusor) and the inner door starts opening (internal sphincter). A signal also shoots up to the brain's pons so you FEEL the urge."}},
    "Voluntary Response":{ac:{n:'Voluntary Response',d:'Signal reaches PONS (brainstem) - conscious awareness of need to urinate. YES: relax external sphincter (skeletal muscle, voluntary) - urine flows. NO: voluntarily contract external sphincter - detrusor relaxes, urge fades temporarily. Children lack full skeletal muscle control - cannot voluntarily hold it.'},si:{n:'The Manual Override',d:"Once the urge signal hits the pons, YOU decide: go or wait? Go = relax the outer door (external sphincter - same muscle type as biceps, fully voluntary). Wait = clench the outer door, bladder relaxes, urge fades briefly. Toddlers can't control it because they're still developing skeletal muscle control."}},
    "Detrusor Muscle":{ac:{n:'Detrusor Muscle',d:'3-layer smooth muscle forming the bladder wall. Parasympathetic pelvic nerves trigger contraction to void. Sympathetic hypogastric nerve causes relaxation to store. Overactive detrusor = urge incontinence.'},si:{n:'The Bladder Squeezer',d:"The muscular wall of the bladder. Contracts when the parasympathetic nervous system fires (the rest-and-digest system includes urination). Like squeezing a water balloon - pushes urine out. Overactive = urge incontinence, can't hold it."}},
    "Sphincters":{ac:{n:'Urethral Sphincters',d:'Internal urethral sphincter: smooth muscle, involuntary (ANS). Opens automatically during micturition. External urethral sphincter: skeletal muscle, voluntary (somatic). Under conscious control. Both must relax for normal voiding.'},si:{n:'The Two Doors',d:"Inner door (internal sphincter): automatic - the ANS runs it, you can't control it. Outer door (external sphincter): you control this - it's skeletal muscle like your bicep. Both must open to urinate. You can consciously clench the outer one to hold on."}},
  },
  "Acid-Base and Electrolytes":{
    "Acidosis Response":{ac:{n:'Renal Response to Acidosis',d:'Blood too acidic (low pH, excess H+). DCT response: (1) Secretes H+ from blood into tubule - exits in urine. (2) Reabsorbs HCO3- (bicarbonate base) from tubule into blood - neutralises H+. Result: urine pH decreases (more acidic urine), blood pH rises back toward normal 7.35-7.45.'},si:{n:'Blood Too Acidic: Fix It',d:'Too many H+ ions in blood. DCT acts as bouncer: throws H+ out of blood into the pee tube (exits with urine). At same time grabs bicarbonate (HCO3- - a natural antacid) from tube into blood to neutralise the excess acid. Pee gets more acidic, blood returns to normal.'}},
    "Alkalosis Response":{ac:{n:'Renal Response to Alkalosis',d:'Blood too basic (high pH, excess HCO3-). DCT response: (1) Secretes HCO3- from blood into tubule - exits in urine. (2) Reabsorbs H+ from tubule into blood - neutralises excess HCO3-. Result: urine pH increases (more alkaline urine), blood pH drops back toward normal.'},si:{n:'Blood Too Basic: Fix It',d:'Too much bicarbonate in blood. DCT flips it: bicarbonate gets thrown out into the urine tube and leaves with pee. H+ ions get grabbed from the tube into blood to lower pH. Pee gets more alkaline, blood pH returns to normal. Kidneys are the ONLY organ that can fully correct acid/base imbalances.'}},
    "Sodium Balance":{ac:{n:'Sodium (Na+) Reabsorption Distribution',d:'Na+ accounts for 90-95% of extracellular fluid solutes. Distribution: PCT reabsorbs 65% (always, not hormonal). Loop of Henle reabsorbs 25% (always). DCT reabsorbs remaining 10% - THIS portion is controlled by aldosterone. Aldosterone - Na+ channels in DCT - more Na+ reabsorbed - water follows - increased blood volume and BP.'},si:{n:'The Salt Split',d:'Of all salt filtered, here is the split: PCT grabs 65% automatically. Loop grabs another 25% automatically. The last 10% is where aldosterone turns the dial - and that 10% makes ALL the difference to blood pressure and fluid balance.'}},
  },
  "Clinical Reference":{
    "GFR":{ac:{n:'Glomerular Filtration Rate (GFR)',d:'Normal = 125 mL/min = 180 L/day. eGFR estimated from serum creatinine + age + sex + weight. Creatinine = ideal marker: produced at constant rate by muscle, freely filtered, NOT reabsorbed or secreted. Decreased GFR = sign of kidney damage. Stages of CKD: G1 greater than 90 (normal), G2 60-89, G3a 45-59, G3b 30-44, G4 15-29, G5 less than 15 = kidney failure.'},si:{n:'Filter Speed Test',d:'Normal: 125 mL/min (a coffee mug of blood cleaned every minute). Doctors measure creatinine in blood to estimate it - high creatinine = kidneys not clearing it fast enough = GFR too low = kidneys struggling. Below 15 = kidney failure = dialysis or transplant needed.'}},
    "Glycosuria":{ac:{n:'Glycosuria - Glucose in Urine',d:'Glucose should not appear in urine. PCT SGLT2 transporters reabsorb ALL glucose. If blood glucose exceeds ~180 mg/dL (renal threshold), transporters saturate - glucose spills into urine. Main cause: diabetes mellitus. Also pregnancy, Fanconi syndrome, SGLT2 inhibitor drugs (therapeutic glycosuria used to treat diabetes).'},si:{n:'Sugar in Pee',d:"Normally zero sugar in pee - PCT grabs it all back. But if blood sugar rockets too high (diabetes), the sugar-grabbers get overwhelmed and sugar slips through. SGLT2 inhibitor drugs intentionally cause glycosuria to lower blood glucose - it's now actually a diabetes treatment!"}},
    "Proteinuria":{ac:{n:'Proteinuria - Protein in Urine',d:'Proteins too large for normal glomerular filtration. If glomerular membrane or podocytes are damaged, proteins leak through. Associated with: heart failure, hypertension, diabetic nephropathy, glomerulonephritis. Persistent proteinuria = significant red flag for kidney damage.'},si:{n:'Protein in Pee',d:'Proteins are too big to fit through the filter - healthy pee has zero. Protein in urine means the filter mesh is DAMAGED. Causes: high blood pressure destroying the filter over time, diabetes, infection. Caught early you can slow the damage. Urine dipstick detects this.'}},
    "Hematuria":{ac:{n:'Hematuria - Blood in Urine',d:'RBCs in urine (gross = visible; microscopic = dipstick or microscopy). Far too large for normal filtration. Causes: kidney stones (trauma to ureter/urethra), UTI, kidney or bladder cancer, trauma, glomerulonephritis. Always requires investigation.'},si:{n:'Blood in Pee',d:'Red blood cells are WAY too big for the filter - should NEVER appear in urine. If they do, something is physically broken: a stone scraping a tube, infection causing bleeding, or a tumour. Even microscopic blood on a dipstick needs investigation. Never normal.'}},
    "Ketonuria":{ac:{n:'Ketonuria - Ketones in Urine',d:'Ketones = fatty acid metabolism byproducts when body burns fat (no available glucose). Causes: untreated diabetes mellitus (cannot use glucose, burns fat instead), starvation, keto diet. Diabetic ketoacidosis (DKA) = medical emergency requiring hospital treatment.'},si:{n:'Ketones in Pee',d:"When the body runs out of useable sugar or can't use it (uncontrolled diabetes), it burns fat instead. Burning fat produces ketones - acidic waste. Small amounts expected on keto diet. In uncontrolled diabetes, ketone levels become dangerously high - DKA - a life-threatening emergency."}},
    "Nitrituria":{ac:{n:'Nitrituria - Nitrites in Urine',d:'Gram-negative bacteria (E. coli, Klebsiella, Proteus) convert urinary nitrates to nitrites. Detected on urine dipstick. Strong indicator of UTI. Combined with leukocyte esterase (pyuria) = high specificity for UTI diagnosis.'},si:{n:"Bacteria's Calling Card",d:"Certain UTI bacteria (like E. coli) eat urinary nitrates and produce nitrites as waste. Detecting nitrites on a dipstick = catching bacteria red-handed. Combine with white blood cells in urine (pyuria) = near-certain UTI diagnosis."}},
    "Pyuria":{ac:{n:'Pyuria - WBCs in Urine',d:'Leukocytes in urine detected by microscopy or leukocyte esterase dipstick. Indicates urinary tract inflammation or infection. Most common: UTI. Also: pyelonephritis (kidney infection), interstitial nephritis, sterile pyuria (TB of urinary tract).'},si:{n:'White Blood Cells in Pee',d:"WBCs in urine = immune system fighting a battle in the urinary tract. A quick dipstick catches this via leukocyte esterase. Almost always means infection. If it keeps coming back despite antibiotics, doctors look for rarer causes like TB of the urinary tract."}},
  },
};

const FLOWS={
  normal:{emoji:'💧',lbl:'Normal Urine Formation',desc:'Step-by-step journey of blood through the nephron under normal conditions.',
    ac:`graph TD\nA["Renal Artery: blood arrives"] --> B["Afferent arteriole (wider) creates high pressure"]\nB --> C["Glomerulus - GFR 125 mL/min\\nProteins and RBCs stay in blood"]\nC --> D["Bowmans Capsule - filtrate collected"]\nD --> E["PCT: ALL glucose, AAs, vitamins reabsorbed\\n60 to 70% water reabsorbed by osmosis"]\nE --> F["Descending Loop: 20% more water out\\n90% water total now recovered"]\nF --> G["Ascending Loop: Na+ K+ Cl- pumped out\\nBuilds medullary gradient"]\nG --> H["DCT: hormonal fine-tuning\\nacid/base adjustment"]\nH --> I["Collecting Duct: ADH sets final volume"]\nI --> J["Renal Pelvis to Ureter to Bladder"]\nJ --> K["Urine: 1.5 to 2 L per day\\n96% water, 2% urea, 2% solutes"]`,
    si:`graph TD\nA["Dirty blood arrives"] --> B["Pressure builds in narrow vessel"]\nB --> C["Pressure Mesh - everything small blasted through\\nBig stuff stays behind"]\nC --> D["Catching Cup - filtrate collected"]\nD --> E["Reclaim Belt - grabs all sugar, protein bits, vitamins\\n60 to 70% water saved"]\nE --> F["Water Slide Down - water leaks out passively\\n90% water total saved"]\nF --> G["Salt Pumper Up - pumps salt out\\nMakes core salty, sucks out more water"]\nG --> H["Smart Adjuster - hormone orders\\nFine-tunes salt and acid levels"]\nH --> I["Release Valve - brain decides final water amount"]\nI --> J["Exits kidney, squeezes down to bladder"]\nJ --> K["Pee: about 1.5 L per day"]`},

function SystemMap({am,dark}){
  const [view,setView]=React.useState('macro');
  const [sel,setSel]=React.useState('pyramid');
  React.useEffect(()=>setSel(view==='macro'?'pyramid':'glomerulus'),[view]);
  const parts=view==='macro'?MACRO:MICRO;
  const nums=view==='macro'?KNUM:NNUM;
  const info=parts[sel]?.[am?'si':'ac']||{n:'',d:''};
  const col=parts[sel]?.col||'#0d9488';
  return(
    <div className="flex flex-col gap-4">
      <div className="flex items-center justify-center gap-2">
        {[['macro','Whole Kidney','#0d9488'],['micro','Nephron','#8b5cf6']].map(([v,lbl,c])=>(
          <button key={v} onClick={()=>setView(v)}
            className="px-4 py-2 text-xs font-semibold rounded-xl border tr"
            style={view===v?{background:c,borderColor:c,color:'#fff'}:{borderColor:dark?'#334155':'#e2e8f0',color:dark?'#94a3b8':'#64748b'}}>
            {lbl}
          </button>

      </div>
      <div className="flex flex-col lg:flex-row gap-4 items-start">
        <div className="w-full lg:w-1/2 flex flex-col items-center gap-2">
          <div className="rounded-xl overflow-hidden border w-full" style={{background:'#fff',borderColor:dark?'#334155':'#e2e8f0'}}>
            <img src={view==='macro'?PRO_KIDNEY:PRO_NEPHRON} alt={view==='macro'?'Kidney cross-section':'Nephron diagram'}

              onError={e=>{e.target.style.opacity='0.15';}}/>
          </div>
          <p className={`text-xs text-center ${dark?'text-slate-600':'text-slate-400'}`}>
            <a href="https://commons.wikimedia.org" target="_blank" rel="noopener" className="underline">Wikimedia Commons</a> · CC BY-SA 3.0
          </p>
        </div>
        <div className="w-full lg:w-1/2 flex flex-col gap-3">
          <div className="p-4 rounded-2xl border" style={{borderColor:col+'44',background:dark?'rgba(30,41,59,.7)':'rgba(241,245,249,.8)'}}>
            <div className="flex items-center gap-2 mb-2">
              <div className="w-2.5 h-2.5 rounded-full" style={{background:col}}/>
              <h2 className="text-base font-bold" style={{color:col}}>{info.n}</h2>
            </div>
            <p className={`text-sm leading-6 ${dark?'text-slate-300':'text-slate-600'}`}>{info.d}</p>
          </div>
          <div className="flex flex-wrap gap-1.5">
            {Object.entries(nums).map(([n,k])=>{
              const p=parts[k];if(!p)return null;
              return(
                <button key={n} onClick={()=>setSel(k)}
                  className="text-xs px-2 py-1 rounded-lg border tr font-semibold"
                  style={sel===k?{background:p.col,color:'#fff',borderColor:p.col}:{borderColor:dark?'#475569':'#d1d5db',color:dark?'#94a3b8':'#64748b'}}>
                  <span style={{opacity:.5,marginRight:'2px'}}>{n}.</span>{p.lbl}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// DEEP DIRECTORY
function Leaf({label,data,am,active,setActive}){
  const on=active===label;
  return(
    <div onClick={()=>setActive(label,data)} style={{paddingLeft:'18px'}}
      className={`cursor-pointer flex items-center gap-2 py-1.5 px-2 rounded-lg tr text-xs ${on?'bg-blue-500/20 text-blue-400 font-semibold':'text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800'}`}>
      <Ic.File/><span className="truncate">{label}</span>
    </div>
  );
}
function Branch({label,node,am,active,setActive,depth=0}){
  const [open,setOpen]=useState(depth<1);
  if(node.ac)return<Leaf label={label} data={node} am={am} active={active} setActive={setActive}/>;
  return(
    <div>
      <div onClick={()=>setOpen(!open)} style={{paddingLeft:`${depth*12}px`}}
        className="cursor-pointer flex items-center gap-2 py-1.5 px-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 tr text-xs font-semibold text-slate-600 dark:text-slate-300">
        <Ic.Caret o={open}/><Ic.Folder/><span>{label}</span>
      </div>
      {open&&<div>{Object.entries(node).map(([k,v])=><Branch key={k} label={k} node={v} am={am} active={active} setActive={setActive} depth={depth+1}/>)}</div>}
    </div>
  );
}

function ProcessFlow({am,dark}){
  const [sc,setSc]=useState('normal');
  const [step,setStep]=useState(-1);
  const [playing,setPlaying]=useState(false);
  const ref=useRef(null);
  const ctr=useRef(0);
  const timerRef=useRef(null);
  const steps=STEPS[sc]?.[am?'si':'ac']||[];
  const total=steps.length;

  useEffect(()=>{setStep(-1);setPlaying(false);},[sc,am]);

  // Render mermaid ONLY when scenario, mode, or theme changes — NOT on step
  useEffect(()=>{
    if(!window.mermaid||!ref.current)return;
    const el=ref.current;
    el.innerHTML='';
    const id='mm'+(++ctr.current);
    const def=FLOWS[sc][am?'si':'ac'];
    mermaid.initialize({startOnLoad:false,theme:dark?'dark':'base',flowchart:{curve:'basis',htmlLabels:true}});
    try{
      mermaid.render(id,def,function(svg){
        if(el){el.innerHTML=svg;
          // Remove the hidden render element mermaid leaves behind
          const ghost=document.getElementById('d'+id);if(ghost)ghost.remove();
        }
      });
    }catch(e){el.innerHTML='<p style="color:#f87171;padding:16px;font-size:12px">Diagram rendering error — try switching to another scenario and back.</p>';}
  },[sc,am,dark]);

  // Highlight nodes separately — this runs on step changes without re-rendering mermaid
  useEffect(()=>{
    if(!ref.current)return;
    const nodes=ref.current.querySelectorAll('.node');
    if(!nodes.length)return;
    nodes.forEach((n,i)=>{
      n.style.transition='opacity .3s, filter .3s';
      n.style.opacity=step<0||i<=step?'1':'.15';
      if(i===step){n.style.filter='drop-shadow(0 0 8px rgba(13,148,136,.8))';}
      else{n.style.filter='none';}
    });
  },[step]);

  useEffect(()=>{
    if(playing&&step<total-1){timerRef.current=setTimeout(()=>setStep(s=>s+1),2200);}
    else if(step>=total-1)setPlaying(false);
    return()=>clearTimeout(timerRef.current);
  },[playing,step,total]);

  const play=()=>{if(step>=total-1)setStep(0);else if(step<0)setStep(0);setPlaying(true);};
  const pause=()=>setPlaying(false);
  const next=()=>{setPlaying(false);setStep(s=>Math.min(s+1,total-1));};
  const prev=()=>{setPlaying(false);setStep(s=>Math.max(s-1,0));};
  const reset=()=>{setPlaying(false);setStep(-1);};

  return(
    <div className="flex flex-col gap-4" style={{minHeight:'320px'}}>
      {/* Scenario selector */}
      <div className="flex gap-2 overflow-x-auto pb-1">
        {Object.entries(FLOWS).map(([k,s])=>(
          <button key={k} onClick={()=>setSc(k)}
            className={`px-3 py-2 rounded-xl border tr text-xs font-semibold whitespace-nowrap shrink-0 ${sc===k?'bg-teal-500/10 border-teal-500 text-teal-400':'border-slate-200 dark:border-slate-700 text-slate-500 hover:border-slate-400'}`}>
            <span className="mr-1">{s.emoji}</span>{s.lbl}
          </button>
        ))}
      </div>
      <div className="flex flex-col lg:flex-row gap-4">
        {/* Diagram */}
        <div className={`flex-1 rounded-xl border flex items-start justify-center p-3 overflow-auto ${dark?'bg-slate-900/50 border-slate-800':'bg-slate-50 border-slate-200'}`} style={{minHeight:'280px'}}>
          <div ref={ref} className="w-full flex justify-center" style={{minHeight:'200px'}}/>
        </div>
        {/* Controls + narration */}
        <div className="w-full lg:w-64 shrink-0 flex flex-col gap-3">
          <div className={`p-3 rounded-xl text-xs leading-5 ${dark?'bg-slate-800/60 text-slate-400':'bg-slate-100 text-slate-500'}`}>{FLOWS[sc].desc}</div>
          {/* Playback */}
          <div className="flex items-center gap-2 justify-center">
            <button onClick={reset} className={`p-2 rounded-lg tr ${dark?'hover:bg-slate-800 text-slate-400':'hover:bg-slate-200 text-slate-500'}`} title="Reset">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
            <button onClick={prev} disabled={step<=0} className={`p-2 rounded-lg tr ${step<=0?'opacity-30 cursor-not-allowed':'hover:bg-slate-200 dark:hover:bg-slate-800'} ${dark?'text-slate-400':'text-slate-500'}`}>
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button onClick={playing?pause:play} className="px-5 py-2 rounded-xl text-xs font-semibold bg-teal-500 text-white hover:bg-teal-600 tr">
              {playing?'Pause':step<0?'Play':'Resume'}
            </button>
            <button onClick={next} disabled={step>=total-1} className={`p-2 rounded-lg tr ${step>=total-1?'opacity-30 cursor-not-allowed':'hover:bg-slate-200 dark:hover:bg-slate-800'} ${dark?'text-slate-400':'text-slate-500'}`}>
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
          {/* Progress */}
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-slate-500 font-mono w-10 text-right">{step<0?'—':step+1}/{total}</span>
            <div className={`flex-1 h-1.5 rounded-full ${dark?'bg-slate-800':'bg-slate-200'}`}>
              <div className="h-full rounded-full bg-teal-500 tr" style={{width:`${step<0?0:((step+1)/total)*100}%`}}/>
            </div>
          </div>
          {/* Narration */}
          {step>=0&&(
            <div className={`p-3 rounded-xl border text-xs leading-5 ${dark?'bg-teal-900/20 border-teal-800/40 text-teal-300':'bg-teal-50 border-teal-200 text-teal-700'}`} style={{animation:'primerIn .3s ease-out'}}>
              <span className="font-bold text-teal-400">Step {step+1}: </span>{steps[step]}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// CANVAS
function Canvas({dark}){
  const ref=useRef(null);
  const [drawing,setDrawing]=useState(false);
  const [ch,setCh]=useState(0);
  const [col,setCol]=useState('#38bdf8');
  const [sz,setSz]=useState(3);
  const [eraser,setEraser]=useState(false);
  const history=useRef([]);
  const CHAL=[
    {t:'Challenge 1: Full Nephron Path',d:"Draw the complete journey: Glomerulus to Bowman's to PCT to descending loop to ascending loop to DCT to collecting duct. Label what each section reabsorbs or secretes."},
    {t:'Challenge 2: ADH Feedback Loop',d:'Draw: Dehydration to osmoreceptors in hypothalamus to posterior pituitary to ADH to collecting duct to aquaporins open to water reabsorbed to osmolarity drops to ADH stops. Show the negative feedback arrow.'},
    {t:'Challenge 3: RAAS Cascade',d:'Draw: Low BP to JG cells to renin to angiotensinogen to angiotensin I to ACE to angiotensin II. Then show the 5 effects: vasoconstriction, aldosterone, ADH, thirst, noradrenaline.'},
    {t:'Challenge 4: Acid-Base Correction',d:'Draw two boxes side by side: (1) Acidosis: DCT secretes H+, reabsorbs HCO3-. (2) Alkalosis: DCT secretes HCO3-, reabsorbs H+.'},
    {t:'Challenge 5: EPO Negative Feedback',d:'Draw: Hypoxia to kidney EPOS cells to EPO released to red bone marrow to more RBCs to more O2 to EPOS cells reduce EPO. Circle the negative feedback.'},
  ];
  const saveState=()=>{const c=ref.current;if(c){history.current.push(c.getContext('2d').getImageData(0,0,c.width,c.height));if(history.current.length>30)history.current.shift();}};
  const undo=()=>{const c=ref.current;if(!c||history.current.length===0)return;const d=c.getContext('2d');if(history.current.length===1){d.clearRect(0,0,c.width,c.height);history.current=[];}else{history.current.pop();d.putImageData(history.current[history.current.length-1],0,0);}};
  const pos=e=>{const r=ref.current.getBoundingClientRect();const t=e.touches?.[0]||e;return[(t.clientX-r.left)*(ref.current.width/r.width),(t.clientY-r.top)*(ref.current.height/r.height)];};
  const start=e=>{e.preventDefault();saveState();const[x,y]=pos(e);const c=ref.current.getContext('2d');c.beginPath();c.moveTo(x,y);setDrawing(true);};
  const move=e=>{if(!drawing)return;e.preventDefault();const[x,y]=pos(e);const c=ref.current.getContext('2d');
    if(eraser){c.globalCompositeOperation='destination-out';c.lineWidth=sz*4;}
    else{c.globalCompositeOperation='source-over';c.lineWidth=sz;c.strokeStyle=col;}
    c.lineTo(x,y);c.lineCap='round';c.lineJoin='round';c.stroke();};
  const stop=()=>{if(drawing){const c=ref.current.getContext('2d');c.globalCompositeOperation='source-over';}setDrawing(false);};
  const clear=()=>{saveState();const c=ref.current;c.getContext('2d').clearRect(0,0,c.width,c.height);};
  const save=()=>{const c=ref.current;if(!c)return;const a=document.createElement('a');a.download='urinary-system-drawing.png';a.href=c.toDataURL();a.click();};
  const resize=()=>{const c=ref.current;if(!c)return;const d=c.getContext('2d');const img=d.getImageData(0,0,c.width,c.height);c.width=c.offsetWidth;c.height=c.offsetHeight;d.putImageData(img,0,0);};
  useEffect(()=>{const c=ref.current;c.width=c.offsetWidth;c.height=c.offsetHeight;window.addEventListener('resize',resize);
    const kb=e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}};
    window.addEventListener('keydown',kb);return()=>{window.removeEventListener('resize',resize);window.removeEventListener('keydown',kb);};},[]);
  const COLS=['#38bdf8','#4ade80','#f97316','#f43f5e','#a78bfa','#fbbf24','#f8fafc','#1e293b'];
  return(
    <div className="flex flex-col gap-3 w-full">
      <div className={`p-3 rounded-xl text-xs leading-5 ${dark?'bg-purple-900/20 border border-purple-800/30 text-purple-300':'bg-purple-50 border border-purple-200 text-purple-700'}`}>
        <button onClick={()=>setCh(c=>(c+1)%CHAL.length)} className="text-left w-full">
          <span className="font-bold">{CHAL[ch].t}: </span>{CHAL[ch].d}
          <span className="block text-[10px] mt-1 opacity-60">Tap here for next challenge</span>
        </button>
      </div>
      {/* Toolbar */}
      <div className="flex flex-wrap items-center gap-2">
        <div className="flex gap-1.5 flex-wrap">{COLS.map(c=>(
          <button key={c} onClick={()=>{setCol(c);setEraser(false);}}
            className={`w-8 h-8 md:w-6 md:h-6 rounded-full border-2 tr ${!eraser&&col===c?'ring-2 ring-offset-1 ring-teal-400':''}`}
            style={{background:c,borderColor:!eraser&&col===c?'white':'transparent'}}/>
        ))}</div>
        <div className={`h-6 w-px ${dark?'bg-slate-700':'bg-slate-300'}`}/>
        <select value={sz} onChange={e=>setSz(+e.target.value)} className={`text-xs px-2 py-1.5 rounded-lg border ${dark?'bg-slate-800 border-slate-700 text-slate-300':'bg-white border-slate-200 text-slate-600'}`}>
          <option value={1}>Fine</option><option value={3}>Normal</option><option value={6}>Thick</option><option value={12}>Brush</option>
        </select>
        <button onClick={()=>setEraser(!eraser)}
          className={`text-xs px-3 py-1.5 rounded-lg border tr font-semibold ${eraser?'bg-amber-500/20 border-amber-500 text-amber-400':'border-slate-200 dark:border-slate-700 text-slate-500 hover:border-slate-400'}`}>
          {eraser?'Eraser ON':'Eraser'}
        </button>
        <div className={`h-6 w-px ${dark?'bg-slate-700':'bg-slate-300'}`}/>
        <button onClick={undo} className={`text-xs px-2.5 py-1.5 rounded-lg border tr ${dark?'border-slate-700 text-slate-400 hover:bg-slate-800':'border-slate-200 text-slate-500 hover:bg-slate-100'}`} title="Undo">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h10a5 5 0 015 5v2M3 10l4-4m-4 4l4 4"/></svg>
        </button>
        <button onClick={save} className={`text-xs px-2.5 py-1.5 rounded-lg border tr ${dark?'border-slate-700 text-slate-400 hover:bg-slate-800':'border-slate-200 text-slate-500 hover:bg-slate-100'}`} title="Save as PNG">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        </button>
        <button onClick={clear} className="flex items-center gap-1 text-xs px-3 py-1.5 bg-red-500/10 text-red-400 border border-red-500/20 rounded-lg hover:bg-red-500/20 tr ml-auto"><Ic.Trash/>Clear</button>
      </div>
      <canvas ref={ref}
        onMouseDown={start} onMouseMove={move} onMouseUp={stop} onMouseLeave={stop}
        onTouchStart={start} onTouchMove={move} onTouchEnd={stop}
        className={`w-full rounded-xl border ${eraser?'cursor-cell':'cursor-crosshair'} ${dark?'bg-slate-900 border-slate-700':'bg-white border-slate-200'}`}
        style={{height:'50vh',minHeight:'280px',maxHeight:'500px',touchAction:'none'}}/>
    </div>
  );
}

// APP
function App(){
  const [am,setAm]=useState(false);
  const [dark,setDark]=useState(true);
  const [tab,setTab]=useState('map');
  const [showPrimer,setShowPrimer]=useState(()=>{try{return !localStorage.getItem('ush_seen')}catch(e){return true}});
  const dismissPrimer=()=>{setShowPrimer(false);try{localStorage.setItem('ush_seen','1')}catch(e){}};
  useEffect(()=>{document.body.style.backgroundColor=dark?'#020617':'#f8fafc';},[dark]);
  const TABS=[{id:'map',lbl:'System Map',icon:<Ic.Map/>},{id:'dir',lbl:'Deep Directory',icon:<Ic.Dir/>},{id:'flow',lbl:'Process Flow',icon:<Ic.Flow/>},{id:'lab',lbl:'Clinical Lab',icon:<Ic.Lab/>},{id:'canvas',lbl:'Canvas',icon:<Ic.Draw/>}];
  return(
    <div className={dark?'dark':''}>
      {showPrimer&&<Primer dark={dark} onDismiss={dismissPrimer}/>}
      <div className="min-h-screen text-slate-800 dark:text-slate-50 font-sans flex flex-col p-3 md:p-6 main-wrap">
        <div className="max-w-7xl mx-auto w-full flex flex-col gap-4 flex-1">
          <div className="flex justify-between items-center">
            <div className="flex items-center gap-2"><div className="h-2 w-2 rounded-full bg-teal-500" style={{boxShadow:'0 0 10px rgba(13,148,136,.9)'}}/><span className="text-xs font-bold uppercase tracking-widest text-slate-500">Urinary System Hub</span></div>
            <div className="flex items-center gap-1">
              <button onClick={()=>setShowPrimer(true)} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 tr text-slate-500" title="Show guide">
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </button>
              <button onClick={()=>setDark(!dark)} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 tr text-slate-500">{dark?<Ic.Sun/>:<Ic.Moon/>}</button>
            </div>
          </div>
          <header className={`rounded-2xl p-4 md:p-5 flex flex-col sm:flex-row justify-between items-center gap-3 md:gap-4 ${dark?'gd':'gl'}`}>
            <div className="text-center sm:text-left">
              <h1 className="text-lg md:text-2xl font-display font-bold">{am?'City Water Treatment Network':'Renal System and Urinary Tract'}</h1>
              <p className="text-xs text-slate-500 mt-1">{am?'Simple analogy mode - everything explained simply':'Filter 180 L blood/day to 1.5 L urine. Regulate BP, pH, electrolytes, RBCs, Vitamin D'}</p>
            </div>
            <div className="flex items-center gap-3 bg-slate-100/60 dark:bg-slate-900/60 px-3 md:px-4 py-2 md:py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 shrink-0">
              <span className={`text-xs font-semibold ${am?'text-teal-400':'text-slate-400'}`}>Simple</span>
              <button onClick={()=>setAm(!am)} className={`relative inline-flex h-5 w-10 items-center rounded-full tr ${am?'bg-slate-600':'bg-teal-500'}`}>
                <span className={`inline-block h-3 w-3 transform rounded-full bg-white tr ${am?'translate-x-1':'translate-x-6'}`}/>
              </button>
              <span className={`text-xs font-semibold ${!am?'text-teal-400':'text-slate-400'}`}>Academic</span>
            </div>
          </header>
          <nav className="desktop-tabs flex gap-1 overflow-x-auto border-b border-slate-200 dark:border-slate-800">
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`flex whitespace-nowrap items-center gap-1.5 px-4 py-2.5 text-xs font-semibold tr border-b-2 rounded-t-lg ${tab===t.id?'text-teal-400 border-teal-500 bg-teal-500/10':`text-slate-500 border-transparent ${dark?'hover:text-slate-300 hover:bg-slate-800/40':'hover:text-slate-700 hover:bg-slate-100'}`}`}>
                {t.icon}{t.lbl}
              </button>
            ))}
          </nav>
          <main className={`rounded-2xl flex-grow flex flex-col p-3 md:p-6 ${dark?'gd':'gl'}`}>
            {tab==='map'&&<SystemMap am={am} dark={dark}/>}
            {tab==='dir'&&<DeepDir am={am} dark={dark}/>}
            {tab==='flow'&&<ProcessFlow am={am} dark={dark}/>}
            {tab==='lab'&&<ClinicalLab am={am} dark={dark}/>}
            {tab==='canvas'&&<Canvas dark={dark}/>}
          </main>
        </div>
      </div>
      {/* Mobile Bottom Nav */}
      <nav className="mobile-bnav fixed bottom-0 left-0 right-0 z-40 items-center justify-around py-2 px-1 border-t"
        style={{background:dark?'rgba(15,23,42,.95)':'rgba(255,255,255,.95)',backdropFilter:'blur(12px)',borderColor:dark?'rgba(51,65,85,.6)':'rgba(203,213,225,.8)'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg tr min-w-0 flex-1 ${tab===t.id?'text-teal-400':'text-slate-500'}`}>
            {t.icon}
            <span className="text-[10px] font-semibold truncate w-full text-center">{t.lbl}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
